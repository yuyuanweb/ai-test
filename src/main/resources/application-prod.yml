# 生产环境配置
spring:
  # MySQL 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/ai_eval?useSSL=false&allowPublicKeyRetrieval=true
    username: ai_eval
    password: 11111111
  # Redis 配置
  data:
    redis:
      database: 1
      host: 127.0.0.1
      port: 6379
      timeout: 5000
      password: 12345678
  # RabbitMQ 配置
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: rabbitmq
    password: rabbitmq
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
  ai:
    openai:
      # OpenRouter 网关地址（Spring AI会自动添加/v1/chat/completions）
      base-url: https://openrouter.ai/api
      # OpenRouter API Key (从环境变量读取)
      api-key: sk-or-v1-xxxxx
      chat:
        options:
          # 默认模型
          model: qwen/qwen-plus
          temperature: 0.7
          max-tokens: 4096
tencent:
  cos:
    accessKey: your-accessKey
    secretKey: your-secretKey
    region: ap-guangzhou
    bucket: yupi-1300582479