spring:
  application:
    name: ai-test
  profiles:
    active: local
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  # MySQL 数据库配置 (实际配置在application-local.yml中)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_eval
    username: root
    password: 11111111
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
  # RabbitMQ 配置
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
  # Spring AI 配置
  ai:
    openai:
      # OpenRouter 网关地址（Spring AI会自动添加/v1/chat/completions）
      base-url: https://openrouter.ai/api
      # OpenRouter API Key (从环境变量读取)
      api-key: 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
      chat:
        options:
          # 默认模型
          model: qwen/qwen-plus
          temperature: 0.7
          max-tokens: 4096
  devtools:
    restart:
      enabled: true
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
    encoding:
      charset: UTF-8
      enabled: true
      force: true
# springdoc-openapi 配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yupi.template.controller
# knife4j 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
# MyBatis-Flex 配置
mybatis-flex:
  configuration:
    # 禁用下划线转驼峰（数据库字段使用驼峰命名）
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    print-banner: true
# 日志配置
logging:
  level:
    com.yupi.template.mapper: debug
    org.springframework.ai: debug

